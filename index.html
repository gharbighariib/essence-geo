<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>خلاصة الجغرافيا</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700;900&display=swap');

  /* ══ THEME TOKENS ══ */
  :root {
    --bg: #0a0c12; --bg2: #0f1219; --bg3: #151923;
    --card: #161b25; --card2: #1c2334;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
    --text: #e8eaf0; --text2: #9ba3b8; --text3: #616980;
    --gold: #f5c842; --gold2: #e6b020;
    --blue: #4a9eff; --blue2: #2c7de8;
    --purple: #a855f7; --purple2: #8b35e8;
    --green: #34d399; --red: #f87171;
    --geo: #4a9eff; --hist: #a855f7;
    --radius: 16px; --radius-sm: 10px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --shadow-lg: 0 8px 48px rgba(0,0,0,0.6);
    --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
    --topbar-bg: rgba(10,12,18,0.92);
    --header-grad: linear-gradient(160deg,#0f1a2e 0%,#0a0c12 60%);
    --fc-front: linear-gradient(135deg,#1c2334,#161b25);
    --fc-back: linear-gradient(135deg,#1a2540,#101825);
  }
  body.light {
    --bg: #f0f2f8; --bg2: #e8eaf2; --bg3: #dde0ec;
    --card: #ffffff; --card2: #eef0f8;
    --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.14);
    --text: #181c2e; --text2: #4a5070; --text3: #8a90a8;
    --topbar-bg: rgba(240,242,248,0.94);
    --header-grad: linear-gradient(160deg,#d8e4f8 0%,#f0f2f8 60%);
    --fc-front: linear-gradient(135deg,#ffffff,#eef0f8);
    --fc-back: linear-gradient(135deg,#e8f0ff,#dde4f5);
    --shadow: 0 4px 20px rgba(0,0,0,0.1);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Cairo','Tajawal',sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; overflow-x: hidden;
    font-size: 16px; line-height: 1.7;
    transition: background 0.3s, color 0.3s;
  }

  /* ── SCROLL PROGRESS ── */
  #scroll-progress { position:fixed;top:0;right:0;left:0;z-index:999;height:3px;pointer-events:none; }
  #scroll-progress-bar { height:100%;width:0%;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .1s linear;border-radius:0 2px 2px 0; }

  /* ── RIPPLE ── */
  .ripple-container { position:relative;overflow:hidden; }
  .ripple { position:absolute;border-radius:50%;transform:scale(0);animation:rippleAnim .5s linear;background:rgba(255,255,255,0.12);pointer-events:none; }
  body.light .ripple { background:rgba(0,0,0,0.08); }
  @keyframes rippleAnim { to { transform:scale(4);opacity:0; } }

  /* ── VIEWS ── */
  .view { display:none; }
  .view.active { display:block; }

  /* ── THEME TOGGLE ── */
  #theme-toggle {
    position:fixed; top:12px; left:12px; z-index:998;
    width:40px; height:40px; border-radius:12px;
    background:var(--card); border:1.5px solid var(--border2);
    color:var(--text2); cursor:pointer; font-size:18px;
    display:flex; align-items:center; justify-content:center;
    transition:var(--transition); box-shadow:var(--shadow);
  }
  #theme-toggle:hover { color:var(--gold); border-color:rgba(245,200,66,0.4); }

  /* ══════ HOME ══════ */
  #home { min-height:100vh; padding-bottom:40px; }
  .home-header {
    background:var(--header-grad);
    padding:48px 20px 36px; position:relative; overflow:hidden;
    border-bottom:1px solid var(--border);
  }
  .home-header::before {
    content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(74,158,255,0.1) 0%,transparent 70%);
  }
  .home-header-inner { position:relative;max-width:680px;margin:0 auto;text-align:center; }
  .app-logo {
    width:64px;height:64px;margin:0 auto 16px;
    background:linear-gradient(135deg,rgba(74,158,255,0.2),rgba(168,85,247,0.2));
    border:1.5px solid var(--border2);border-radius:18px;
    display:flex;align-items:center;justify-content:center;font-size:28px;
  }
  .app-title {
    font-size:clamp(1.8rem,6vw,2.6rem);font-weight:900;
    background:linear-gradient(120deg,var(--text),var(--gold));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    line-height:1.2;letter-spacing:-0.5px;
  }
  .app-subtitle { color:var(--text2);font-size:.95rem;margin-top:8px; }
  .progress-badge {
    display:inline-flex;align-items:center;gap:6px;
    background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.25);
    color:var(--green);font-size:.82rem;padding:4px 12px;
    border-radius:20px;margin-top:14px;font-weight:600;
  }

  /* subject tabs */
  .subject-tabs { display:flex;gap:8px;padding:20px 16px 4px;max-width:680px;margin:0 auto; }
  .subject-tab {
    flex:1;padding:12px 8px;border-radius:12px;
    border:1.5px solid var(--border);background:var(--card);
    color:var(--text2);font-family:'Cairo',sans-serif;font-size:.95rem;font-weight:700;
    cursor:pointer;transition:var(--transition);display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .subject-tab:hover { border-color:var(--border2);color:var(--text); }
  .subject-tab.active.geo { border-color:var(--geo);color:var(--geo);background:rgba(74,158,255,0.08); }
  .subject-tab.active.hist { border-color:var(--purple);color:var(--purple);background:rgba(168,85,247,0.08); }

  /* lesson cards */
  .cards-grid { padding:16px;max-width:680px;margin:0 auto;display:grid;grid-template-columns:1fr;gap:12px; }
  .lesson-card {
    background:var(--card);border:1px solid var(--border);
    border-radius:var(--radius);padding:20px;
    cursor:pointer;position:relative;overflow:hidden;
    transition:var(--transition);user-select:none;
  }
  .lesson-card:hover { border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--shadow); }
  .lesson-card:active { transform:scale(0.98); }
  .lesson-card.geo-card:hover { border-color:rgba(74,158,255,0.35);box-shadow:0 4px 24px rgba(74,158,255,0.1); }
  .lesson-card.hist-card:hover { border-color:rgba(168,85,247,0.35);box-shadow:0 4px 24px rgba(168,85,247,0.1); }
  .card-top { display:flex;align-items:flex-start;justify-content:space-between;gap:12px; }
  .card-left { flex:1; }
  .card-badge {
    display:inline-flex;align-items:center;gap:4px;
    font-size:.72rem;font-weight:700;padding:3px 8px;
    border-radius:6px;margin-bottom:8px;
  }
  .badge-geo { background:rgba(74,158,255,0.12);color:var(--geo);border:1px solid rgba(74,158,255,0.2); }
  .badge-hist { background:rgba(168,85,247,0.12);color:var(--purple);border:1px solid rgba(168,85,247,0.2); }
  .card-title { font-size:1rem;font-weight:700;color:var(--text);line-height:1.4; }
  .card-arrow {
    width:36px;height:36px;border-radius:10px;
    background:var(--bg3);border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;font-size:14px;color:var(--text3);transition:var(--transition);
  }
  .lesson-card:hover .card-arrow { color:var(--text);background:var(--card2); }
  .geo-card:hover .card-arrow { color:var(--geo);border-color:rgba(74,158,255,0.3); }
  .hist-card:hover .card-arrow { color:var(--purple);border-color:rgba(168,85,247,0.3); }
  .card-bottom { display:flex;align-items:center;justify-content:space-between;margin-top:14px; }
  .card-modes { display:flex;gap:6px; }
  .mode-dot { width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px; }
  .dot-gold { background:rgba(245,200,66,0.12);color:var(--gold); }
  .dot-blue { background:rgba(74,158,255,0.12);color:var(--blue); }
  .dot-purple { background:rgba(168,85,247,0.12);color:var(--purple); }
  .dot-teal { background:rgba(52,211,153,0.12);color:var(--green); }
  .completed-badge { display:inline-flex;align-items:center;gap:4px;font-size:.75rem;color:var(--green);font-weight:600; }

  /* ══════ LESSON VIEW ══════ */
  #lesson { min-height:100vh; }
  .lesson-topbar {
    position:sticky;top:0;z-index:100;
    background:var(--topbar-bg);backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);padding:0 16px;
    transition:background .3s;
  }
  .lesson-topbar-inner { max-width:680px;margin:0 auto; }
  .topbar-row1 { display:flex;align-items:center;gap:12px;padding:12px 0 8px; }
  .back-btn {
    width:38px;height:38px;border-radius:10px;
    background:var(--card);border:1px solid var(--border);
    color:var(--text2);cursor:pointer;font-size:18px;
    display:flex;align-items:center;justify-content:center;
    transition:var(--transition);flex-shrink:0;
  }
  .back-btn:hover { color:var(--text);border-color:var(--border2); }
  .lesson-title-top {
    flex:1;font-size:.9rem;font-weight:700;color:var(--text);
    line-height:1.3;overflow:hidden;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  }
  .complete-btn {
    padding:7px 12px;border-radius:8px;border:1.5px solid var(--border);
    background:transparent;color:var(--text2);font-family:'Cairo',sans-serif;
    font-size:.78rem;font-weight:700;cursor:pointer;flex-shrink:0;
    transition:var(--transition);white-space:nowrap;
  }
  .complete-btn.done { border-color:rgba(52,211,153,0.4);color:var(--green);background:rgba(52,211,153,0.08); }

  /* tabs */
  .tabs-row { display:flex;gap:4px;padding-bottom:12px; }
  .tab-btn {
    flex:1;padding:9px 4px;border-radius:10px;
    border:1.5px solid var(--border);background:transparent;
    font-family:'Cairo',sans-serif;font-size:.78rem;font-weight:700;
    color:var(--text3);cursor:pointer;transition:var(--transition);
    display:flex;align-items:center;justify-content:center;gap:4px;
  }
  .tab-btn:hover { color:var(--text2);border-color:var(--border2); }
  .tab-btn.active-tab-gold { background:rgba(245,200,66,0.1);border-color:rgba(245,200,66,0.4);color:var(--gold); }
  .tab-btn.active-tab-blue { background:rgba(74,158,255,0.1);border-color:rgba(74,158,255,0.4);color:var(--blue); }
  .tab-btn.active-tab-purple { background:rgba(168,85,247,0.1);border-color:rgba(168,85,247,0.4);color:var(--purple); }
  .tab-btn.active-tab-teal { background:rgba(52,211,153,0.1);border-color:rgba(52,211,153,0.4);color:var(--green); }

  /* panes */
  .lesson-body { max-width:680px;margin:0 auto;padding:20px 16px 80px; }
  .tab-pane { display:none;animation:fadeSlide .25s ease; }
  .tab-pane.active { display:block; }
  @keyframes fadeSlide { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  /* content */
  .content-block { line-height:1.85; }
  .content-block h1,.content-block h2,.content-block h3 { font-weight:800;color:var(--text);margin:20px 0 10px; }
  .content-block h1 { font-size:1.3rem;color:var(--gold); }
  .content-block h2 { font-size:1.1rem;border-right:3px solid var(--blue);padding-right:10px; }
  .content-block h3 { font-size:.95rem;color:var(--text2); }
  .content-block p { color:var(--text2);margin-bottom:10px;font-size:.95rem; }
  .content-block ul,.content-block ol { padding-right:20px;margin-bottom:12px; }
  .content-block li { color:var(--text2);font-size:.95rem;margin-bottom:6px; }
  .content-block strong { color:var(--text);font-weight:700; }
  .content-block table { width:100%;border-collapse:collapse;margin:16px 0;font-size:.88rem;border-radius:10px;overflow:hidden; }
  .content-block th { background:var(--card2);padding:10px 12px;text-align:right;color:var(--text);font-weight:700;border:1px solid var(--border2); }
  .content-block td { padding:9px 12px;border:1px solid var(--border);color:var(--text2);background:var(--card); }
  .content-block tr:nth-child(even) td { background:var(--bg3); }
  .essence-chip {
    display:inline-flex;align-items:center;gap:6px;
    background:rgba(245,200,66,0.08);border:1px solid rgba(245,200,66,0.2);
    color:var(--gold);font-size:.8rem;font-weight:700;
    padding:5px 12px;border-radius:8px;margin-bottom:16px;
  }
  .essence-card { background:var(--card);border:1px solid rgba(245,200,66,0.15);border-radius:14px;padding:18px;margin-bottom:12px; }

  /* definitions */
  .definitions-section { margin-top:28px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden; }
  .definitions-header { display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--card);cursor:pointer;transition:var(--transition); }
  .definitions-header:hover { background:var(--card2); }
  .definitions-header-text { font-size:.95rem;font-weight:800;color:var(--text);display:flex;align-items:center;gap:8px; }
  .defs-toggle { color:var(--text3);transition:var(--transition); }
  .defs-toggle.open { transform:rotate(180deg); }
  .definitions-body { display:none;padding:4px 0; }
  .definitions-body.open { display:block; }
  .def-item { border-bottom:1px solid var(--border); }
  .def-item:last-child { border-bottom:none; }
  .def-term { display:flex;align-items:center;justify-content:space-between;padding:12px 18px;cursor:pointer;transition:var(--transition); }
  .def-term:hover { background:var(--bg3); }
  .def-term-text { font-size:.9rem;font-weight:700;color:var(--blue); }
  .def-expand-icon { color:var(--text3);font-size:12px;transition:var(--transition); }
  .def-expand-icon.open { transform:rotate(180deg); }
  .def-meaning { display:none;padding:0 18px 14px 18px;font-size:.88rem;color:var(--text2);line-height:1.7;border-top:1px solid var(--border); }
  .def-meaning.open { display:block; }

  /* quiz */
  .quiz-section { margin-top:28px; }
  .quiz-header-card { background:linear-gradient(135deg,rgba(168,85,247,0.12),rgba(74,158,255,0.08));border:1px solid rgba(168,85,247,0.2);border-radius:var(--radius);padding:20px;margin-bottom:16px; }
  .quiz-title { font-size:1rem;font-weight:800;color:var(--text);display:flex;align-items:center;gap:8px; }
  .quiz-subtitle { font-size:.83rem;color:var(--text2);margin-top:4px; }
  .quiz-score-bar { display:flex;align-items:center;gap:10px;margin-top:12px; }
  .quiz-score-label { font-size:.82rem;color:var(--text2);white-space:nowrap; }
  .quiz-score-track { flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden; }
  .quiz-score-fill { height:100%;background:linear-gradient(90deg,var(--purple),var(--blue));border-radius:3px;transition:width .4s ease; }
  .quiz-score-num { font-size:.82rem;font-weight:800;color:var(--text);white-space:nowrap; }
  .question-card { background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:12px;transition:var(--transition); }
  .question-card.answered { border-color:var(--border2); }
  .question-text { font-size:.95rem;font-weight:700;color:var(--text);margin-bottom:14px;line-height:1.5; }
  .question-num { display:inline-block;font-size:.72rem;font-weight:800;color:var(--purple);background:rgba(168,85,247,0.1);padding:2px 7px;border-radius:5px;margin-bottom:8px; }
  .options-list { display:flex;flex-direction:column;gap:8px; }
  .option-btn {
    width:100%;padding:11px 14px;border-radius:10px;
    border:1.5px solid var(--border);background:var(--bg2);
    color:var(--text2);font-family:'Cairo',sans-serif;
    font-size:.88rem;font-weight:600;text-align:right;
    cursor:pointer;transition:var(--transition);position:relative;overflow:hidden;
  }
  .option-btn:hover:not(:disabled) { border-color:rgba(168,85,247,0.4);color:var(--text);background:var(--card); }
  .option-btn:disabled { cursor:default; }
  .option-btn.correct { border-color:var(--green)!important;background:rgba(52,211,153,0.08)!important;color:var(--green)!important; }
  .option-btn.wrong { border-color:var(--red)!important;background:rgba(248,113,113,0.08)!important;color:var(--red)!important; }
  .answer-feedback { margin-top:10px;padding:9px 12px;border-radius:8px;font-size:.83rem;font-weight:600;display:none; }
  .feedback-correct { background:rgba(52,211,153,0.1);color:var(--green);border:1px solid rgba(52,211,153,0.2); }
  .feedback-wrong { background:rgba(248,113,113,0.1);color:var(--red);border:1px solid rgba(248,113,113,0.2); }
  .quiz-result-card { background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);padding:24px;text-align:center;display:none;margin-top:16px; }
  .result-emoji { font-size:48px;margin-bottom:12px; }
  .result-title { font-size:1.2rem;font-weight:900;color:var(--text); }
  .result-score { font-size:2.5rem;font-weight:900;margin:8px 0; }
  .result-msg { font-size:.88rem;color:var(--text2);margin-bottom:16px; }
  .retry-btn { padding:10px 24px;border-radius:10px;border:1.5px solid var(--purple);background:rgba(168,85,247,0.1);color:var(--purple);font-family:'Cairo',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:var(--transition); }
  .retry-btn:hover { background:rgba(168,85,247,0.2); }

  /* ══════ FLASHCARDS ══════ */
  .fc-section { padding-bottom:20px; }

  .fc-header {
    background:linear-gradient(135deg,rgba(52,211,153,0.1),rgba(74,158,255,0.06));
    border:1px solid rgba(52,211,153,0.2);border-radius:var(--radius);
    padding:18px 20px;margin-bottom:20px;
  }
  .fc-header-title { font-size:1rem;font-weight:800;color:var(--text);display:flex;align-items:center;gap:8px; }
  .fc-header-sub { font-size:.82rem;color:var(--text2);margin-top:3px; }
  .fc-meta { display:flex;align-items:center;justify-content:space-between;margin-top:12px;flex-wrap:wrap;gap:8px; }
  .fc-counter { font-size:.85rem;font-weight:700;color:var(--text2); }
  .fc-counter span { color:var(--green);font-size:1rem; }
  .fc-shuffle-btn {
    padding:6px 14px;border-radius:8px;border:1.5px solid rgba(52,211,153,0.3);
    background:rgba(52,211,153,0.08);color:var(--green);
    font-family:'Cairo',sans-serif;font-size:.8rem;font-weight:700;
    cursor:pointer;transition:var(--transition);
  }
  .fc-shuffle-btn:hover { background:rgba(52,211,153,0.16); }

  /* Card scene */
  .fc-scene {
    width:100%;perspective:1200px;
    margin-bottom:20px;cursor:pointer;
    user-select:none;
  }
  .fc-inner {
    position:relative;width:100%;
    min-height:220px;
    transform-style:preserve-3d;
    transition:transform .55s cubic-bezier(.4,.2,.2,1);
    border-radius:20px;
  }
  .fc-inner.flipped { transform:rotateY(180deg); }

  .fc-face {
    position:absolute;inset:0;
    border-radius:20px;backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:28px 24px;text-align:center;
    box-shadow:var(--shadow-lg);
  }
  .fc-front {
    background:var(--fc-front);
    border:1.5px solid rgba(52,211,153,0.25);
  }
  .fc-back {
    background:var(--fc-back);
    border:1.5px solid rgba(74,158,255,0.3);
    transform:rotateY(180deg);
  }
  .fc-face-label {
    font-size:.7rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;
    padding:3px 10px;border-radius:6px;margin-bottom:16px;
    opacity:.8;
  }
  .fc-front .fc-face-label { background:rgba(52,211,153,0.12);color:var(--green); }
  .fc-back .fc-face-label { background:rgba(74,158,255,0.12);color:var(--blue); }

  .fc-term {
    font-size:clamp(1.2rem,4vw,1.6rem);font-weight:900;
    color:var(--text);line-height:1.3;
  }
  .fc-hint {
    font-size:.78rem;color:var(--text3);margin-top:12px;
    display:flex;align-items:center;gap:4px;
  }
  .fc-meaning {
    font-size:clamp(.88rem,2.5vw,1rem);color:var(--text2);
    line-height:1.75;font-weight:500;
  }

  /* progress dots */
  .fc-dots {
    display:flex;justify-content:center;gap:6px;
    flex-wrap:wrap;margin-bottom:16px;
  }
  .fc-dot {
    width:8px;height:8px;border-radius:50%;

// ══════════════════════ STATE ══════════════════════
let currentLesson = null;
let currentTab = 'essence';
let currentFilter = 'all';
let quizState = {};
let fcState = { index: 0, flipped: false, cards: [], seen: new Set() };

function getProgress() { try { return JSON.parse(localStorage.getItem('essengeo_progress')||'{}'); } catch { return {}; } }
function saveProgress(d) { try { localStorage.setItem('essengeo_progress', JSON.stringify(d)); } catch {} }

// ══════════════════════ RIPPLE ══════════════════════
document.addEventListener('click', function(e) {
  const btn = e.target.closest('.ripple-container');
  if (!btn) return;
  const rect = btn.getBoundingClientRect();
  const d = Math.max(rect.width, rect.height);
  const r = document.createElement('span');
  r.className = 'ripple';
  r.style.cssText = `width:${d}px;height:${d}px;right:${e.clientX-rect.right+d/2}px;top:${e.clientY-rect.top-d/2}px`;
  btn.appendChild(r);
  setTimeout(()=>r.remove(), 600);
});

// ══════════════════════ TOAST ══════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ══════════════════════ SCROLL PROGRESS ══════════════════════
window.addEventListener('scroll', ()=>{
  if (!document.getElementById('lesson').classList.contains('active')) return;
  const docH = document.documentElement.scrollHeight - window.innerHeight;
  const pct = docH>0 ? (window.scrollY/docH)*100 : 0;
  document.getElementById('scroll-progress-bar').style.width = pct+'%';
});

// ══════════════════════ HOME ══════════════════════
function getAllLessons() {
  return Object.values(lessons).flatMap(s=>Object.values(s));
}

function filterSubject(filter) {
  currentFilter = filter;
  document.querySelectorAll('.subject-tab').forEach(t=>t.classList.remove('active'));
  const map = {all:'tab-all',geography:'tab-geo',history:'tab-hist'};
  document.getElementById(map[filter])?.classList.add('active');
  renderCards();
}

function renderCards() {
  const grid = document.getElementById('cards-grid');
  const progress = getProgress();
  const all = getAllLessons();
  const filtered = currentFilter==='all' ? all : all.filter(l=>l.subject===currentFilter);
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">لا توجد دروس</div></div>`;
    return;
  }
  grid.innerHTML = filtered.map(lesson => {
    const isGeo = lesson.subject==='geography';
    const isDone = !!progress[lesson.id];
    return `<div class="lesson-card ${isGeo?'geo-card':'hist-card'} ripple-container" onclick="openLesson('${lesson.subject}','${lesson.id}')">
      <div class="card-top">
        <div class="card-left">
          <span class="card-badge ${isGeo?'badge-geo':'badge-hist'}">${isGeo?'📍 جغرافيا':'📜 تاريخ'}</span>
          <div class="card-title">${lesson.title}</div>
        </div>
        <div class="card-arrow">←</div>
      </div>
      <div class="card-bottom">
        <div class="card-modes">
          <div class="mode-dot dot-gold" title="الخلاصة">⚡</div>
          <div class="mode-dot dot-blue" title="الفهم">🔵</div>
          <div class="mode-dot dot-purple" title="الكامل">🟣</div>
          <div class="mode-dot dot-teal" title="بطاقات">🃏</div>
        </div>
        ${isDone?'<span class="completed-badge">✅ مكتمل</span>':''}
      </div>
    </div>`;
  }).join('');
  const done = all.filter(l=>!!progress[l.id]).length;
  document.getElementById('progress-text').textContent = `${done} من ${all.length} دروس مكتملة`;
}

// ══════════════════════ OPEN LESSON ══════════════════════
function findLesson(subject, id) {
  const s = lessons[subject]; if (!s) return null;
  return Object.values(s).find(l=>l.id===id)||null;
}

function openLesson(subject, id) {
  const lesson = findLesson(subject, id);
  if (!lesson) return;
  currentLesson = lesson;
  currentTab = 'essence';
  document.getElementById('lesson-title-top').textContent = lesson.title;
  const progress = getProgress();
  const btn = document.getElementById('complete-btn');
  if (progress[lesson.id]) { btn.textContent='✅ مكتمل'; btn.classList.add('done'); }
  else { btn.textContent='✓ أتممته'; btn.classList.remove('done'); }
  renderLessonContent(lesson);
  document.getElementById('home').classList.remove('active');
  document.getElementById('lesson').classList.add('active');
  window.scrollTo(0,0);
  document.getElementById('scroll-progress-bar').style.width='0%';
  switchTab('essence');
}

function renderLessonContent(lesson) {
  document.getElementById('pane-essence').innerHTML = lesson.essence + renderDefinitions(lesson.definitions);
  document.getElementById('pane-structured').innerHTML = lesson.structured + renderDefinitions(lesson.definitions);
  document.getElementById('pane-full').innerHTML = lesson.full + renderDefinitions(lesson.definitions);
  renderFlashcards(lesson);
  renderQuiz(lesson);
}

// ══════════════════════ DEFINITIONS ══════════════════════

    <div class="definitions-header" onclick="toggleDefinitionsHub()">
      <div class="definitions-header-text">📚 المصطلحات الأساسية</div>

function toggleDefinitionsHub() {

function toggleDef(i) {

// FLASHCARDS ENGINE
// ══════════════════════════════════════════
function renderFlashcards(lesson) {
  const pane = document.getElementById('pane-flashcards');
  if (!lesson.definitions || !lesson.definitions.length) {
    pane.innerHTML = `<div class="empty-state"><div class="empty-icon">🃏</div><div class="empty-text">لا توجد بطاقات لهذا الدرس بعد</div></div>`;
    return;
  }
  fcState = { index: 0, flipped: false, cards: [...lesson.definitions], seen: new Set() };
  pane.innerHTML = buildFlashcardsHTML(lesson.definitions.length);
  updateFlashcard();
  initFCSwipe();
}

function buildFlashcardsHTML(total) {
  const dots = Array.from({length:total},(_,i)=>`<div class="fc-dot" id="fc-dot-${i}"></div>`).join('');
  return `<div class="fc-section">
    <div class="fc-header">
      <div class="fc-header-title">🃏 بطاقات المراجعة</div>
      <div class="fc-header-sub">اضغط على البطاقة لكشف المعنى — راجع المصطلحات بسرعة</div>
      <div class="fc-meta">
        <div class="fc-counter">البطاقة <span id="fc-cur">1</span> من <span id="fc-tot">${total}</span></div>
        <button class="fc-shuffle-btn ripple-container" onclick="shuffleCards()">🔀 خلط</button>
      </div>
    </div>
    <div class="fc-dots" id="fc-dots">${dots}</div>
    <div class="fc-scene" id="fc-scene" onclick="flipCard()">
      <div class="fc-inner" id="fc-inner">
        <div class="fc-face fc-front">
          <div class="fc-face-label">المصطلح</div>
          <div class="fc-term" id="fc-term">...</div>
          <div class="fc-hint">👆 اضغط لكشف المعنى</div>
        </div>
        <div class="fc-face fc-back">
          <div class="fc-face-label">المعنى</div>
          <div class="fc-meaning" id="fc-meaning">...</div>
        </div>
      </div>
    </div>
    <div class="fc-controls">
      <button class="fc-nav-btn ripple-container" id="fc-prev" onclick="fcNav(-1)" title="السابق">→</button>
      <button class="fc-flip-btn ripple-container" onclick="flipCard()">
        <span id="fc-flip-label">🔄 اقلب</span>
      </button>
      <button class="fc-nav-btn ripple-container" id="fc-next" onclick="fcNav(1)" title="التالي">←</button>
    </div>
    <div class="fc-swipe-hint">← اسحب يميناً أو يساراً للتنقل →</div>
    <div class="fc-all-strip">
      <div class="fc-strip-header" onclick="toggleFCStrip()">
        <div class="fc-strip-title">📋 جميع البطاقات (${fcState.cards.length})</div>
        <span class="fc-strip-toggle" id="fc-strip-toggle">▼</span>
      </div>
      <div class="fc-strip-body" id="fc-strip-body">
        <div class="fc-mini-list" id="fc-mini-list"></div>
      </div>
    </div>
  </div>`;
}

function updateFlashcard() {
  const { index, cards, seen, flipped } = fcState;
  const card = cards[index];
  if (!card) return;

  const inner = document.getElementById('fc-inner');
  const termEl = document.getElementById('fc-term');
  const meaningEl = document.getElementById('fc-meaning');
  const curEl = document.getElementById('fc-cur');
  const flipLabel = document.getElementById('fc-flip-label');
  const prevBtn = document.getElementById('fc-prev');
  const nextBtn = document.getElementById('fc-next');

  if (!inner || !termEl) return;

  termEl.textContent = card.term;
  meaningEl.textContent = card.meaning;
  if (curEl) curEl.textContent = index + 1;

  inner.classList.toggle('flipped', flipped);
  if (flipLabel) flipLabel.textContent = flipped ? '🔄 اقلب' : '🔄 اقلب';

  if (prevBtn) prevBtn.disabled = index === 0;
  if (nextBtn) nextBtn.disabled = index === cards.length - 1;

  // Dots
  document.querySelectorAll('.fc-dot').forEach((dot, i) => {
    dot.className = 'fc-dot';
    if (i === index) dot.classList.add('active');
    else if (seen.has(i)) dot.classList.add('seen');
  });

  // Mini list
  const miniList = document.getElementById('fc-mini-list');
  if (miniList) {
    miniList.innerHTML = cards.map((c,i)=>`
      <div class="fc-mini-item" onclick="jumpToCard(${i})">
        <div class="fc-mini-num">${i+1}</div>
        <div class="fc-mini-term">${c.term}</div>
        <div class="fc-mini-arrow">${i===index?'◀':''}</div>
      </div>`).join('');
  }
}

function flipCard() {
  fcState.flipped = !fcState.flipped;
  fcState.seen.add(fcState.index);
  const inner = document.getElementById('fc-inner');
  if (inner) inner.classList.toggle('flipped', fcState.flipped);
  // Update dots
  document.querySelectorAll('.fc-dot').forEach((dot, i) => {
    dot.className = 'fc-dot';
    if (i === fcState.index) dot.classList.add('active');
    else if (fcState.seen.has(i)) dot.classList.add('seen');
  });
}

function fcNav(dir) {
  const newIdx = fcState.index + dir;
  if (newIdx < 0 || newIdx >= fcState.cards.length) return;
  fcState.seen.add(fcState.index);
  fcState.index = newIdx;
  fcState.flipped = false;
  updateFlashcard();
}

function jumpToCard(i) {
  fcState.seen.add(fcState.index);
  fcState.index = i;
  fcState.flipped = false;
  updateFlashcard();
}

function shuffleCards() {
  // Fisher-Yates shuffle
  const arr = [...fcState.cards];
  for (let i = arr.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  fcState.cards = arr;
  fcState.index = 0;
  fcState.flipped = false;
  fcState.seen = new Set();
  updateFlashcard();
  showToast('🔀 تم خلط البطاقات!');
}

function toggleFCStrip() {
  document.getElementById('fc-strip-body')?.classList.toggle('open');
  document.getElementById('fc-strip-toggle')?.classList.toggle('open');
}

// Touch/swipe support
function initFCSwipe() {
  const scene = document.getElementById('fc-scene');
  if (!scene) return;
  let startX = 0, startY = 0;
  scene.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, {passive:true});
  scene.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
      // RTL: swipe left = next (visually "forward"), swipe right = prev
      if (dx < 0) fcNav(1); else fcNav(-1);
    }
  }, {passive:true});
}

// ══════════════════════ QUIZ ══════════════════════
function renderQuiz(lesson) {
  const pane = document.getElementById('pane-quiz');
  if (!lesson.quiz||!lesson.quiz.length) {
    pane.innerHTML = `<div class="empty-state"><div class="empty-icon">🧩</div><div class="empty-text">لا يوجد اختبار لهذا الدرس بعد</div></div>`;
    return;
  }
  quizState = { lessonId:lesson.id, total:lesson.quiz.length, answered:0, correct:0, answers:{} };
  pane.innerHTML = `<div class="quiz-section">
    <div class="quiz-header-card">
      <div class="quiz-title">🧩 اختبر نفسك</div>
      <div class="quiz-subtitle">${lesson.quiz.length} أسئلة — إجابة واحدة صحيحة</div>
      <div class="quiz-score-bar">
        <span class="quiz-score-label">النتيجة:</span>
        <div class="quiz-score-track"><div class="quiz-score-fill" id="score-fill" style="width:0%"></div></div>
        <span class="quiz-score-num" id="score-num">0 / ${lesson.quiz.length}</span>
      </div>
    </div>
    ${lesson.quiz.map((q,qi)=>`
      <div class="question-card" id="qcard-${qi}">
        <div class="question-num">س${qi+1}</div>
        <div class="question-text">${q.q}</div>
        <div class="options-list">
          ${q.options.map((opt,oi)=>`<button class="option-btn ripple-container" id="opt-${qi}-${oi}" onclick="answerQ(${qi},${oi})">${opt}</button>`).join('')}
        </div>
        <div class="answer-feedback" id="feedback-${qi}"></div>
      </div>`).join('')}
    <div class="quiz-result-card" id="quiz-result">
      <div class="result-emoji" id="result-emoji"></div>
      <div class="result-title">انتهى الاختبار!</div>
      <div class="result-score" id="result-score"></div>
      <div class="result-msg" id="result-msg"></div>
      <button class="retry-btn ripple-container" onclick="retryQuiz()">🔄 إعادة الاختبار</button>
    </div>
  </div>`;
}

function answerQ(qi, oi) {
  if (quizState.answers[qi]!==undefined) return;
  const q = currentLesson.quiz[qi];
  const isCorrect = oi===q.answer;
  quizState.answers[qi]=oi; quizState.answered++;
  if (isCorrect) quizState.correct++;
  q.options.forEach((_,i)=>{
    const btn=document.getElementById(`opt-${qi}-${i}`);
    if (!btn) return;
    btn.disabled=true;
    if (i===q.answer) btn.classList.add('correct');
    else if (i===oi&&!isCorrect) btn.classList.add('wrong');
  });
  const fb=document.getElementById(`feedback-${qi}`);
  if (fb) { fb.className='answer-feedback '+(isCorrect?'feedback-correct':'feedback-wrong'); fb.textContent=isCorrect?'✅ إجابة صحيحة! '+q.feedback:'❌ '+q.feedback; fb.style.display='block'; }
  document.getElementById(`qcard-${qi}`)?.classList.add('answered');
  const pct=(quizState.correct/quizState.total)*100;
  document.getElementById('score-fill').style.width=pct+'%';
  document.getElementById('score-num').textContent=`${quizState.correct} / ${quizState.total}`;
  if (quizState.answered===quizState.total) setTimeout(showQuizResult,600);
}

function showQuizResult() {
  const c=quizState.correct,t=quizState.total,pct=Math.round(c/t*100);
  const card=document.getElementById('quiz-result'); if(!card) return;
  let emoji,msg;
  if(pct===100){emoji='🏆';msg='ممتاز! أتقنت هذا الدرس بالكامل.';}
  else if(pct>=80){emoji='🎯';msg='أداء رائع! راجع الأسئلة الخاطئة.';}
  else if(pct>=60){emoji='📚';msg='جيد! ركز أكثر على النقاط الضعيفة.';}
  else{emoji='💪';msg='راجع الدرس مجددًا ثم أعد الاختبار.';}
  document.getElementById('result-emoji').textContent=emoji;
  document.getElementById('result-score').textContent=`${c} / ${t}`;
  document.getElementById('result-score').style.color=pct>=60?'var(--green)':'var(--red)';
  document.getElementById('result-msg').textContent=msg;
  card.style.display='block';
  card.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function retryQuiz() { renderQuiz(currentLesson); }

// ══════════════════════ TABS ══════════════════════
function switchTab(tab) {
  currentTab=tab;
  const tabs=['essence','structured','full','flashcards','quiz'];
  const cls={essence:'active-tab-gold',structured:'active-tab-blue',full:'active-tab-purple',flashcards:'active-tab-teal',quiz:'active-tab-purple'};
  tabs.forEach(t=>{
    document.getElementById(`tab-${t}`)?.setAttribute('class','tab-btn ripple-container');
    document.getElementById(`pane-${t}`)?.classList.remove('active');
  });
  document.getElementById(`tab-${tab}`)?.classList.add(cls[tab]);
  document.getElementById(`pane-${tab}`)?.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

// ══════════════════════ COMPLETE ══════════════════════
function toggleComplete() {
  if (!currentLesson) return;
  const progress=getProgress(), id=currentLesson.id;
  const btn=document.getElementById('complete-btn');
  if (progress[id]) { delete progress[id]; btn.textContent='✓ أتممته'; btn.classList.remove('done'); showToast('تم إلغاء التحديد'); }
  else { progress[id]=true; btn.textContent='✅ مكتمل'; btn.classList.add('done'); showToast('أحسنت! تم تحديد الدرس كمكتمل ✅'); }
  saveProgress(progress);
}

// ══════════════════════ NAVIGATION ══════════════════════
function goHome() {
  document.getElementById('lesson').classList.remove('active');
  document.getElementById('home').classList.add('active');
  window.scrollTo(0,0);
  renderCards();
}

// ══════════════════════ INIT ══════════════════════
renderCards();
filterSubject('all');
</script>
</body>
</html>
